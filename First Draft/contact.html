<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
      
            <div class="nav-content">
                <div class="logo">
                    <a href="index.html">
                        <img id="bakwas"src="images/hi.png" alt="Sahayatri Logo">
                    </a>
                    <h1 id="bhi">Sahaयात्री</h1>
                
                </div>
                </div>
                
        <h2 class="section-title">Contact Us 💬</h2>
               
            </nav>
    
    
    <!-- Contact Section -->
    <section id="contact" class="contact-section">
        <div class="container">
            
            <div class="contact-content">

                <!-- Form -->
                <div class="contact-form-wrapper">
                    <h3>Send us a message</h3>
                    <form class="contact-form" action="https://formsubmit.co/prashannamagar8@gmail.com" method="POST">
                        
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" name="name" placeholder="Your name" required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" placeholder="Your email" required>
                        </div>

                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" name="phone" placeholder="Your phone number">
                        </div>

                        <div class="form-group">
                            <label>Message</label>
                            <textarea name="message" rows="5" placeholder="Your message" required></textarea>
                        </div>

                        <button type="submit" class="submit-button">Send Message</button>

                    </form>
                </div>

                <!-- Contact Info -->
                <div class="contact-info">
                    <h3>Get in Touch</h3>

                    <div class="info-item">
                        <h4>Address</h4>
                        <p>Kathmandu, Nepal</p>
                    </div>

                    <div class="info-item">
                        <h4>Phone</h4>
                        <p>+977 9745384928</p>
                    </div>

                    <div class="info-item">
                        <h4>Email</h4>
                        <p>info@sahayatri.com</p>
                    </div>

                    <div class="info-item">
                        <h4>Hours</h4>
                        <p>24/7 Available</p>
                    </div>

                </div>

            </div>
        </div>
    </section>
      <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Sahaयात्री. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
